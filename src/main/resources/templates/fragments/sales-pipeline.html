<!-- ═══════════════════════════════════════════════════════
     fragments/industry/sales-pipeline.html
     ═══════════════════════════════════════════════════════ -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<body>
<div th:fragment="widget" class="bg-white rounded-lg shadow overflow-hidden">
    <div class="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
        <h3 class="font-semibold text-gray-800 text-sm">🚀 Sales Pipeline</h3>
        <a th:href="@{/quotations}" class="text-xs text-primary-600 hover:underline">Lihat Semua →</a>
    </div>
    <div class="p-5 grid grid-cols-3 gap-4">

        <!-- RFQ Open -->
        <div class="text-center">
            <a th:href="@{/rfq(status=OPEN)}" class="block group">
                <div class="w-14 h-14 bg-yellow-100 rounded-full flex items-center justify-center mx-auto
                            group-hover:bg-yellow-200 transition-colors">
                    <span class="text-2xl font-bold text-yellow-700"
                          th:text="${pipeline.rfqOpenCount()}">0</span>
                </div>
                <p class="text-xs text-gray-500 mt-2 font-medium">RFQ Open</p>
                <p class="text-xs text-gray-400">Menunggu penawaran</p>
            </a>
        </div>

        <!-- Quotation Terkirim -->
        <div class="text-center">
            <a th:href="@{/quotations(status=SENT)}" class="block group">
                <div class="w-14 h-14 bg-blue-100 rounded-full flex items-center justify-center mx-auto
                            group-hover:bg-blue-200 transition-colors">
                    <span class="text-2xl font-bold text-blue-700"
                          th:text="${pipeline.quotSentCount()}">0</span>
                </div>
                <p class="text-xs text-gray-500 mt-2 font-medium">Quotation Terkirim</p>
                <p class="text-xs text-gray-400"
                   th:text="${#numbers.formatCurrency(pipeline.quotSentValue())}">Rp 0</p>
            </a>
        </div>

        <!-- SO Aktif -->
        <div class="text-center">
            <a th:href="@{/sales-orders}" class="block group">
                <div class="w-14 h-14 bg-indigo-100 rounded-full flex items-center justify-center mx-auto
                            group-hover:bg-indigo-200 transition-colors">
                    <span class="text-2xl font-bold text-indigo-700"
                          th:text="${pipeline.soActiveCount()}">0</span>
                </div>
                <p class="text-xs text-gray-500 mt-2 font-medium">SO Berjalan</p>
                <p class="text-xs text-gray-400"
                   th:text="${#numbers.formatCurrency(pipeline.soActiveValue())}">Rp 0</p>
            </a>
        </div>
    </div>

    <!-- Pipeline arrow visualization -->
    <div class="px-5 pb-4">
        <div class="flex items-center gap-1 text-xs text-gray-400">
            <span class="px-2 py-0.5 bg-yellow-100 text-yellow-700 rounded">RFQ</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            <span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded">Quotation</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            <span class="px-2 py-0.5 bg-green-100 text-green-700 rounded">WON</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            <span class="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded">Sales Order</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            <span class="px-2 py-0.5 bg-teal-100 text-teal-700 rounded">Invoice</span>
        </div>
    </div>
</div>
</body>
</html>
