<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<body>
<div th:fragment="widget" class="bg-white rounded-lg shadow overflow-hidden">
    <div class="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
        <h3 class="font-semibold text-gray-800 text-sm">🏭 Status Procurement</h3>
        <a th:href="@{/purchase-requests}" class="text-xs text-primary-600 hover:underline">Lihat PR →</a>
    </div>
    <div class="p-5 space-y-2">
        <a th:href="@{/purchase-requests(status=SUBMITTED)}" class="flex items-center justify-between p-3 rounded-lg hover:bg-gray-50" th:classappend="${proc.prPendingApproval() > 0 ? 'bg-yellow-50 border border-yellow-100' : 'bg-gray-50'}">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm" th:classappend="${proc.prPendingApproval() > 0 ? 'bg-yellow-200' : 'bg-gray-200'}">
                    <span th:text="${proc.prPendingApproval() > 0 ? '⏳' : '✓'}"></span>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-700">PR Menunggu Persetujuan</p>
                    <p class="text-xs text-gray-400">Perlu review manajer</p>
                </div>
            </div>
            <span class="text-lg font-bold" th:classappend="${proc.prPendingApproval() > 0 ? 'text-yellow-600' : 'text-gray-400'}" th:text="${proc.prPendingApproval()}">0</span>
        </a>
        <a th:href="@{/purchase-requests(status=APPROVED)}" class="flex items-center justify-between p-3 rounded-lg hover:bg-gray-50" th:classappend="${proc.prApprovedNoPO() > 0 ? 'bg-blue-50 border border-blue-100' : 'bg-gray-50'}">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm" th:classappend="${proc.prApprovedNoPO() > 0 ? 'bg-blue-200' : 'bg-gray-200'}">
                    <span th:text="${proc.prApprovedNoPO() > 0 ? '📋' : '✓'}"></span>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-700">PR Disetujui Belum Jadi PO</p>
                    <p class="text-xs text-gray-400">Buat Purchase Order</p>
                </div>
            </div>
            <span class="text-lg font-bold" th:classappend="${proc.prApprovedNoPO() > 0 ? 'text-blue-600' : 'text-gray-400'}" th:text="${proc.prApprovedNoPO()}">0</span>
        </a>
        <a th:href="@{/goods-receipts(status=DRAFT)}" class="flex items-center justify-between p-3 rounded-lg hover:bg-gray-50" th:classappend="${proc.grPendingConfirm() > 0 ? 'bg-green-50 border border-green-100' : 'bg-gray-50'}">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm" th:classappend="${proc.grPendingConfirm() > 0 ? 'bg-green-200' : 'bg-gray-200'}">
                    <span th:text="${proc.grPendingConfirm() > 0 ? '📦' : '✓'}"></span>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-700">GR Belum Dikonfirmasi</p>
                    <p class="text-xs text-gray-400">Konfirmasi penerimaan barang</p>
                </div>
            </div>
            <span class="text-lg font-bold" th:classappend="${proc.grPendingConfirm() > 0 ? 'text-green-600' : 'text-gray-400'}" th:text="${proc.grPendingConfirm()}">0</span>
        </a>
        <a th:href="@{/purchase-orders}" class="flex items-center justify-between p-3 rounded-lg hover:bg-gray-50" th:classappend="${proc.poOverdue() > 0 ? 'bg-red-50 border border-red-200' : 'bg-gray-50'}">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm" th:classappend="${proc.poOverdue() > 0 ? 'bg-red-200' : 'bg-gray-200'}">
                    <span th:text="${proc.poOverdue() > 0 ? '⚠' : '✓'}"></span>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-700">PO Terlambat</p>
                    <p class="text-xs text-gray-400">Delivery date terlewat</p>
                </div>
            </div>
            <span class="text-lg font-bold" th:classappend="${proc.poOverdue() > 0 ? 'text-red-600' : 'text-gray-400'}" th:text="${proc.poOverdue()}">0</span>
        </a>
    </div>
</div>
</body>
</html>
