<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|Setup Awal - ${theme.footerText}|">Setup Awal - Balaka</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{${theme.themeCssPath}}">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-lg">
        <div class="text-center mb-8">
            <img th:src="@{${theme.logoPath}}" th:alt="${theme.footerText}" class="h-12 mx-auto mb-4">
            <h1 class="text-2xl font-bold text-gray-900">Setup Awal</h1>
            <p class="text-gray-600 mt-1">Buat akun admin pertama dan pilih paket data industri</p>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-8">
            <form th:action="@{/setup}" method="post" class="space-y-5">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" name="username" required minlength="3" maxlength="100" autofocus
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"/>
                </div>

                <div>
                    <label for="fullName" class="block text-sm font-medium text-gray-700 mb-2">Nama Lengkap</label>
                    <input type="text" id="fullName" name="fullName" required maxlength="255"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"/>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email <span class="text-gray-400 font-normal">(opsional)</span></label>
                    <input type="email" id="email" name="email" maxlength="255"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"/>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" name="password" required minlength="8"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"/>
                </div>

                <div>
                    <label for="industryPack" class="block text-sm font-medium text-gray-700 mb-2">Paket Data Industri</label>
                    <select id="industryPack" name="industryPack" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                        <option value="" disabled selected>-- Pilih paket --</option>
                        <option th:each="pack : ${packs}" th:value="${pack}" th:text="${pack}"></option>
                    </select>
                    <p class="text-xs text-gray-500 mt-2">Paket berisi Chart of Accounts, template jurnal, dan data master lainnya yang sesuai untuk jenis usaha Anda.</p>
                </div>

                <button id="btn-setup" type="submit"
                        class="w-full py-3 px-4 bg-primary-700 hover:bg-primary-800 text-white font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2">
                    Mulai
                </button>
            </form>
        </div>

        <div class="text-center mt-8">
            <p class="text-sm text-gray-500" th:text="|&copy; 2025 ${theme.footerText}|">&copy; 2025 Balaka</p>
        </div>
    </div>
</body>
</html>
