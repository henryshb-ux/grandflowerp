<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout('Daftar Quotation', ~{::#page-title}, ~{::section}, ~{})}"
      lang="id">
<head><title>Daftar Quotation</title></head>
<body>
<h1 id="page-title">Daftar Quotation</h1>

<section class="space-y-6" data-testid="quotation-list">

    <!-- Summary Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-sm text-gray-500">Draft</p>
            <p class="text-2xl font-semibold text-gray-900" th:text="${summary.draftCount}">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-sm text-gray-500">Terkirim</p>
            <p class="text-2xl font-semibold text-blue-600" th:text="${summary.sentCount}">0</p>
            <p class="text-xs text-gray-400 mt-1"
               th:text="${#numbers.formatCurrency(summary.outstandingValue)}">Rp 0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-sm text-gray-500">Menang</p>
            <p class="text-2xl font-semibold text-green-600" th:text="${summary.wonCount}">0</p>
            <p class="text-xs text-gray-400 mt-1"
               th:text="${#numbers.formatCurrency(summary.wonValue)}">Rp 0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-sm text-gray-500">Kalah</p>
            <p class="text-2xl font-semibold text-red-500" th:text="${summary.lostCount}">0</p>
        </div>
    </div>

    <!-- Filter & Actions -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <form th:action="@{/quotations}" method="get" class="flex flex-wrap items-center gap-2">
            <select name="status" class="px-3 py-2 border border-gray-300 rounded-lg text-sm"
                    onchange="this.form.submit()">
                <option value="">Semua Status</option>
                <option th:each="s : ${statuses}"
                        th:value="${s.name()}"
                        th:text="${s.label}"
                        th:selected="${selectedStatus != null && selectedStatus.name() == s.name()}">
                </option>
            </select>
            <input type="text" name="search" th:value="${search}"
                   placeholder="Cari nomor / customer / subjek..."
                   class="px-3 py-2 border border-gray-300 rounded-lg text-sm w-64">
            <button type="submit"
                    class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200">
                Cari
            </button>
        </form>

        <a th:href="@{/quotations/new}"
           class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 whitespace-nowrap"
           sec:authorize="hasAuthority('INVOICE_CREATE')">
            + Buat Quotation
        </a>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200 text-sm">
            <thead class="bg-gray-50">
            <tr>
                <th class="px-4 py-3 text-left font-medium text-gray-500">No. Quotation</th>
                <th class="px-4 py-3 text-left font-medium text-gray-500">Customer</th>
                <th class="px-4 py-3 text-left font-medium text-gray-500">Subjek</th>
                <th class="px-4 py-3 text-left font-medium text-gray-500">Tanggal</th>
                <th class="px-4 py-3 text-left font-medium text-gray-500">Berlaku s/d</th>
                <th class="px-4 py-3 text-right font-medium text-gray-500">Total</th>
                <th class="px-4 py-3 text-center font-medium text-gray-500">Status</th>
                <th class="px-4 py-3"></th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
            <tr th:if="${page.empty}">
                <td colspan="8" class="px-4 py-8 text-center text-gray-400">Belum ada quotation</td>
            </tr>
            <tr th:each="q : ${page.content}" class="hover:bg-gray-50">
                <td class="px-4 py-3 font-mono">
                    <a th:href="@{/quotations/{id}(id=${q.id})}"
                       class="text-blue-600 hover:underline"
                       th:text="${q.quotationNumber}">QT-2026-001</a>
                </td>
                <td class="px-4 py-3" th:text="${q.client?.name}">-</td>
                <td class="px-4 py-3 max-w-xs truncate" th:text="${q.subject}">-</td>
                <td class="px-4 py-3" th:text="${#temporals.format(q.quotationDate,'dd MMM yyyy')}">-</td>
                <td class="px-4 py-3"
                    th:classappend="${q.expired ? 'text-red-500' : ''}"
                    th:text="${#temporals.format(q.validUntil,'dd MMM yyyy')}">-</td>
                <td class="px-4 py-3 text-right font-medium"
                    th:text="${#numbers.formatCurrency(q.totalAmount)}">Rp 0</td>
                <td class="px-4 py-3 text-center">
                    <span class="px-2 py-1 rounded-full text-xs font-medium"
                          th:classappend="${
                              q.status.name() == 'DRAFT'      ? 'bg-gray-100 text-gray-700' :
                              q.status.name() == 'SENT'       ? 'bg-blue-100 text-blue-700' :
                              q.status.name() == 'WON'        ? 'bg-green-100 text-green-700' :
                              q.status.name() == 'LOST'       ? 'bg-red-100 text-red-700' :
                                                                'bg-gray-100 text-gray-500'}"
                          th:text="${q.status.label}">
                        Draft
                    </span>
                </td>
                <td class="px-4 py-3 text-right">
                    <a th:href="@{/quotations/{id}(id=${q.id})}"
                       class="text-blue-600 hover:underline text-xs">Detail</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div th:if="${page.totalPages > 1}" class="flex justify-center gap-2">
        <a th:if="${!page.first}"
           th:href="@{/quotations(page=${page.number - 1}, status=${selectedStatus}, search=${search})}"
           class="px-3 py-1 border rounded text-sm">← Prev</a>
        <span class="px-3 py-1 text-sm text-gray-500"
              th:text="${page.number + 1} + ' / ' + ${page.totalPages}"></span>
        <a th:if="${!page.last}"
           th:href="@{/quotations(page=${page.number + 1}, status=${selectedStatus}, search=${search})}"
           class="px-3 py-1 border rounded text-sm">Next →</a>
    </div>

</section>
</body>
</html>
