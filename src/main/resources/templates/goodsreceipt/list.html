     goodsreceipt/list.html
     ═══════════════════════════════════════════════════════════════════════ -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout('Goods Receipt', ~{::#page-title}, ~{::section}, ~{})}"
      lang="id">
<head><title>Goods Receipt</title></head>
<body>
<h1 id="page-title">Goods Receipt (GR)</h1>

<section class="space-y-6" data-testid="gr-list">

    <!-- Summary -->
    <div class="grid grid-cols-3 gap-4">
        <div class="bg-white rounded-lg shadow p-4 border-l-4 border-gray-400">
            <p class="text-xs text-gray-500 uppercase">Draft</p>
            <p class="text-3xl font-bold text-gray-600 mt-1" th:text="${summary.draftCount}">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4 border-l-4 border-green-400">
            <p class="text-xs text-gray-500 uppercase">Dikonfirmasi</p>
            <p class="text-3xl font-bold text-green-600 mt-1" th:text="${summary.confirmedCount}">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4 border-l-4 border-teal-400">
            <p class="text-xs text-gray-500 uppercase">Sudah Dibill</p>
            <p class="text-3xl font-bold text-teal-600 mt-1" th:text="${summary.billedCount}">0</p>
        </div>
    </div>

    <!-- Filter -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <form th:action="@{/goods-receipts}" method="get" class="flex flex-wrap items-center gap-2">
            <select name="status" class="px-3 py-2 border border-gray-300 rounded-lg text-sm"
                    onchange="this.form.submit()">
                <option value="">Semua Status</option>
                <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.label}"
                        th:selected="${selectedStatus != null && selectedStatus.name() == s.name()}"></option>
            </select>
            <input type="text" name="search" th:value="${search}"
                   placeholder="Cari nomor GR / supplier..."
                   class="px-3 py-2 border border-gray-300 rounded-lg text-sm w-56">
            <button type="submit" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200">Cari</button>
        </form>
        <a th:href="@{/purchase-orders(status=CONFIRMED)}"
           class="px-4 py-2 border border-green-300 text-green-700 rounded-lg text-sm hover:bg-green-50 whitespace-nowrap">
            Dari PO Dikonfirmasi →
        </a>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200 text-sm">
            <thead class="bg-gray-50">
            <tr>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">No. GR</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Dari PO</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Supplier</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tgl Terima</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Surat Jalan</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Diterima Oleh</th>
                <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">Status</th>
                <th class="px-4 py-3"></th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
            <tr th:if="${page.empty}">
                <td colspan="8" class="px-4 py-10 text-center text-gray-400">Belum ada Goods Receipt</td>
            </tr>
            <tr th:each="gr : ${page.content}" class="hover:bg-gray-50">
                <td class="px-4 py-3">
                    <a th:href="@{/goods-receipts/{id}(id=${gr.id})}"
                       class="text-primary-600 hover:underline font-mono font-medium"
                       th:text="${gr.grNumber}">GR-2026-001</a>
                </td>
                <td class="px-4 py-3">
                    <a th:if="${gr.purchaseOrder != null}"
                       th:href="@{/purchase-orders/{id}(id=${gr.purchaseOrder.id})}"
                       class="text-primary-600 hover:underline font-mono text-xs"
                       th:text="${gr.purchaseOrder.poNumber}"></a>
                </td>
                <td class="px-4 py-3 font-medium" th:text="${gr.vendor?.name}">-</td>
                <td class="px-4 py-3 whitespace-nowrap"
                    th:text="${#temporals.format(gr.receiptDate, 'dd MMM yyyy')}">-</td>
                <td class="px-4 py-3 font-mono text-xs" th:text="${gr.deliveryNote ?: '—'}">-</td>
                <td class="px-4 py-3 text-gray-600" th:text="${gr.receivedBy ?: '—'}">-</td>
                <td class="px-4 py-3 text-center">
                    <span class="px-2.5 py-1 rounded-full text-xs font-medium"
                          th:classappend="${
                              gr.status.name() == 'DRAFT'     ? 'bg-gray-100 text-gray-600'   :
                              gr.status.name() == 'CONFIRMED' ? 'bg-green-100 text-green-700'  :
                              gr.status.name() == 'BILLED'    ? 'bg-teal-100 text-teal-700'    :
                                                                 'bg-red-100 text-red-600'}"
                          th:text="${gr.status.label}"></span>
                </td>
                <td class="px-4 py-3 text-right">
                    <a th:href="@{/goods-receipts/{id}(id=${gr.id})}"
                       class="text-primary-600 hover:underline text-xs">Detail</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</section>
</body>
</html>
