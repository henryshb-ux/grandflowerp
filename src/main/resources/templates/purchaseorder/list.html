<!-- ═══════════════════════════════════════════════════════════════════════
     purchaseorder/list.html
     ═══════════════════════════════════════════════════════════════════════ -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout('Purchase Order', ~{::#page-title}, ~{::section}, ~{})}"
      lang="id">
<head><title>Purchase Order</title></head>
<body>
<h1 id="page-title">Purchase Order (PO)</h1>

<section class="space-y-6" data-testid="po-list">

    <!-- Summary Cards -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
        <div class="bg-white rounded-lg shadow p-4 border-l-4 border-gray-400">
            <p class="text-xs text-gray-500 uppercase">Draft</p>
            <p class="text-3xl font-bold text-gray-600 mt-1" th:text="${summary.draftCount}">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4 border-l-4 border-blue-400">
            <p class="text-xs text-gray-500 uppercase">Terkirim</p>
            <p class="text-3xl font-bold text-blue-600 mt-1" th:text="${summary.sentCount}">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4 border-l-4 border-indigo-400">
            <p class="text-xs text-gray-500 uppercase">Dikonfirmasi</p>
            <p class="text-3xl font-bold text-indigo-600 mt-1" th:text="${summary.confirmedCount}">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4 border-l-4 border-orange-400">
            <p class="text-xs text-gray-500 uppercase">Sebagian Terima</p>
            <p class="text-3xl font-bold text-orange-600 mt-1" th:text="${summary.partialReceivedCount}">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4 border-l-4 border-green-400">
            <p class="text-xs text-gray-500 uppercase">Nilai PO Aktif</p>
            <p class="text-sm font-bold text-green-700 mt-1"
               th:text="${#numbers.formatCurrency(summary.totalActiveValue)}">Rp 0</p>
        </div>
    </div>

    <!-- Filter -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <form th:action="@{/purchase-orders}" method="get" class="flex flex-wrap items-center gap-2">
            <select name="status" class="px-3 py-2 border border-gray-300 rounded-lg text-sm"
                    onchange="this.form.submit()">
                <option value="">Semua Status</option>
                <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.label}"
                        th:selected="${selectedStatus != null && selectedStatus.name() == s.name()}"></option>
            </select>
            <input type="text" name="search" th:value="${search}"
                   placeholder="Cari nomor PO / supplier / ref..."
                   class="px-3 py-2 border border-gray-300 rounded-lg text-sm w-64">
            <button type="submit" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200">Cari</button>
        </form>
        <a th:href="@{/purchase-requests(status=APPROVED)}"
           class="px-4 py-2 border border-primary-300 text-primary-700 rounded-lg text-sm hover:bg-primary-50 whitespace-nowrap transition-colors">
            Dari PR yang Disetujui →
        </a>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200 text-sm">
            <thead class="bg-gray-50">
            <tr>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">No. PO</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Supplier</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tgl PO</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Est. Terima</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Nilai</th>
                <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">Penerimaan</th>
                <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">Status</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Aksi</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
            <tr th:if="${page.empty}">
                <td colspan="8" class="px-4 py-10 text-center text-gray-400">Belum ada Purchase Order</td>
            </tr>
            <tr th:each="po : ${page.content}" class="hover:bg-gray-50">
                <td class="px-4 py-3">
                    <a th:href="@{/purchase-orders/{id}(id=${po.id})}"
                       class="text-primary-600 hover:underline font-mono font-medium"
                       th:text="${po.poNumber}">PO-2026-001</a>
                </td>
                <td class="px-4 py-3 font-medium" th:text="${po.vendor?.name}">-</td>
                <td class="px-4 py-3 whitespace-nowrap"
                    th:text="${#temporals.format(po.poDate, 'dd MMM yyyy')}">-</td>
                <td class="px-4 py-3 whitespace-nowrap"
                    th:if="${po.expectedDelivery != null}"
                    th:classappend="${po.expectedDelivery.isBefore(T(java.time.LocalDate).now())
                        && po.status.name() != 'RECEIVED' && po.status.name() != 'BILLED'
                        ? 'text-red-600 font-medium' : 'text-gray-600'}"
                    th:text="${#temporals.format(po.expectedDelivery, 'dd MMM yyyy')}">-</td>
                <td class="px-4 py-3 text-gray-400 text-xs" th:if="${po.expectedDelivery == null}">—</td>
                <td class="px-4 py-3 text-right font-medium"
                    th:text="${#numbers.formatCurrency(po.totalAmount)}">Rp 0</td>
                <td class="px-4 py-3">
                    <div class="flex items-center gap-2">
                        <div class="flex-1 bg-gray-200 rounded-full h-1.5 min-w-12">
                            <div class="bg-green-500 h-1.5 rounded-full"
                                 th:style="'width: ' + ${po.receiptProgressPct} + '%'"></div>
                        </div>
                        <span class="text-xs text-gray-500 whitespace-nowrap"
                              th:text="${po.receiptProgressPct} + '%'">0%</span>
                    </div>
                </td>
                <td class="px-4 py-3 text-center">
                    <span class="px-2.5 py-1 rounded-full text-xs font-medium"
                          th:classappend="${
                              po.status.name() == 'DRAFT'              ? 'bg-gray-100 text-gray-600'    :
                              po.status.name() == 'SENT'               ? 'bg-blue-100 text-blue-700'    :
                              po.status.name() == 'CONFIRMED'          ? 'bg-indigo-100 text-indigo-700':
                              po.status.name() == 'PARTIALLY_RECEIVED' ? 'bg-orange-100 text-orange-700':
                              po.status.name() == 'RECEIVED'           ? 'bg-green-100 text-green-700'  :
                              po.status.name() == 'BILLED'             ? 'bg-teal-100 text-teal-700'    :
                                                                          'bg-red-100 text-red-600'}"
                          th:text="${po.status.label}"></span>
                </td>
                <td class="px-4 py-3 text-right whitespace-nowrap space-x-2">
                    <a th:href="@{/purchase-orders/{id}(id=${po.id})}"
                       class="text-primary-600 hover:underline text-xs">Detail</a>
                    <a th:href="@{/purchase-orders/{id}/print(id=${po.id})}" target="_blank"
                       class="text-gray-500 hover:underline text-xs">Cetak</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div th:if="${page.totalPages > 1}" class="flex justify-between text-sm text-gray-500">
        <p th:text="'Halaman ' + ${page.number + 1} + ' dari ' + ${page.totalPages}"></p>
        <div class="flex gap-2">
            <a th:if="${!page.first}"
               th:href="@{/purchase-orders(page=${page.number - 1}, status=${selectedStatus}, search=${search})}"
               class="px-3 py-1 border rounded hover:bg-gray-50">← Prev</a>
            <a th:if="${!page.last}"
               th:href="@{/purchase-orders(page=${page.number + 1}, status=${selectedStatus}, search=${search})}"
               class="px-3 py-1 border rounded hover:bg-gray-50">Next →</a>
        </div>
    </div>

</section>
</body>
</html>
