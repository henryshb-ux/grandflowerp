<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout('Jurnal Manual', ~{::#page-title}, ~{::section}, ~{::script})}"
      lang="id">
<head>
    <title>Jurnal Manual</title>
</head>
<body>
    <h1 id="page-title">Jurnal Manual</h1>

    <section>
        <div class="max-w-4xl mx-auto">
            <!-- Breadcrumb -->
            <nav class="flex items-center gap-2 text-sm text-gray-500 mb-6">
                <a th:href="@{/transactions}" class="hover:text-primary-600">Transaksi</a>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                <span class="text-gray-900 font-medium">Jurnal Manual</span>
            </nav>

            <div x-data="journalEntryForm" class="space-y-6">

                <!-- Header Fields -->
                <div class="bg-white rounded-lg border border-gray-200 p-6 space-y-4">
                    <h2 class="text-lg font-semibold text-gray-900">Informasi Transaksi</h2>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Transaction Date -->
                        <div>
                            <label for="transactionDate" class="block text-sm font-medium text-gray-700 mb-1">Tanggal Transaksi <span class="text-red-500">*</span></label>
                            <input type="date" id="transactionDate" x-model="transactionDate" required
                                   class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                        </div>

                        <!-- Category -->
                        <div>
                            <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Kategori</label>
                            <select id="category" x-model="category"
                                    class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                                <option value="">-- Pilih Kategori --</option>
                                <option value="CLOSING">Jurnal Penutup</option>
                                <option value="ADJUSTING">Jurnal Penyesuaian</option>
                                <option value="OPENING">Jurnal Pembuka</option>
                                <option value="CORRECTION">Jurnal Koreksi</option>
                            </select>
                        </div>
                    </div>

                    <!-- Description -->
                    <div>
                        <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Deskripsi <span class="text-red-500">*</span></label>
                        <input type="text" id="description" x-model="description" required maxlength="500" placeholder="Deskripsi jurnal manual"
                               class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                    </div>
                </div>

                <!-- Journal Lines -->
                <div class="bg-white rounded-lg border border-gray-200 p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-gray-900">Baris Jurnal</h2>
                        <button type="button" x-on:click="addLine"
                                class="inline-flex items-center gap-1 px-3 py-1.5 text-sm font-medium text-primary-700 bg-primary-50 rounded-lg hover:bg-primary-100 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                            Tambah Baris
                        </button>
                    </div>

                    <!-- Header Row -->
                    <div class="grid grid-cols-12 gap-3 px-2 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-200">
                        <div class="col-span-5">Akun</div>
                        <div class="col-span-3 text-right">Debit</div>
                        <div class="col-span-3 text-right">Kredit</div>
                        <div class="col-span-1"></div>
                    </div>

                    <!-- Lines (Alpine-reactive, one accountPicker combobox per line) -->
                    <template x-for="(line, idx) in lines" :key="idx">
                        <div class="grid grid-cols-12 gap-3 px-2 py-3 items-center border-b border-gray-100 journal-line"
                             :data-testid="'journal-line-' + idx">
                            <!-- Account picker -->
                            <div class="col-span-5 relative">
                                <input type="text"
                                       :data-testid="'account-select-' + idx"
                                       x-model="line.label"
                                       @input.debounce.300ms="searchAccounts(line)"
                                       @focus="focusLine(line)"
                                       @click.away="line.pickerOpen = false"
                                       autocomplete="off"
                                       placeholder="Ketik kode/nama akun..."
                                       class="journal-account-picker w-full px-2 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                                <input type="hidden" :value="line.selectedId">
                                <div x-show="line.pickerOpen &amp;&amp; line.results.length > 0"
                                     class="absolute z-20 mt-1 w-full bg-white border border-gray-300 rounded-lg shadow-lg max-h-60 overflow-auto">
                                    <template x-for="a in line.results" :key="a.id">
                                        <button type="button" @click="selectAccount(line, a)"
                                                data-testid="account-picker-result"
                                                class="block w-full text-left px-3 py-2 text-sm hover:bg-primary-50">
                                            <span class="font-medium" x-text="a.code"></span>
                                            <span class="text-gray-500"> — </span>
                                            <span x-text="a.name"></span>
                                        </button>
                                    </template>
                                </div>
                            </div>
                            <!-- Debit -->
                            <div class="col-span-3">
                                <input type="text"
                                       :data-testid="'debit-input-' + idx"
                                       :value="line.debitText"
                                       @input="handleDebitInput(line, $event)"
                                       @focus="onAmountFocus($event)"
                                       @blur="onDebitBlur(line)"
                                       inputmode="numeric"
                                       :disabled="line.credit > 0"
                                       :class="line.credit > 0 ? 'journal-debit bg-gray-100 text-gray-400' : 'journal-debit'"
                                       class="w-full px-2 py-2 text-sm text-right border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                            </div>
                            <!-- Credit -->
                            <div class="col-span-3">
                                <input type="text"
                                       :data-testid="'credit-input-' + idx"
                                       :value="line.creditText"
                                       @input="handleCreditInput(line, $event)"
                                       @focus="onAmountFocus($event)"
                                       @blur="onCreditBlur(line)"
                                       inputmode="numeric"
                                       :disabled="line.debit > 0"
                                       :class="line.debit > 0 ? 'journal-credit bg-gray-100 text-gray-400' : 'journal-credit'"
                                       class="w-full px-2 py-2 text-sm text-right border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                            </div>
                            <!-- Remove (hidden when only the 2 mandatory lines remain) -->
                            <div class="col-span-1 text-center">
                                <button type="button"
                                        x-show="lines.length > 2"
                                        :data-testid="'remove-line-' + idx"
                                        @click="removeLine(idx)"
                                        class="journal-remove-btn p-1 text-gray-400 hover:text-red-500 transition-colors">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        </div>
                    </template>

                    <!-- Totals Row -->
                    <div class="grid grid-cols-12 gap-3 px-2 py-3 font-semibold text-sm border-t-2 border-gray-300 bg-gray-50 rounded-b-lg">
                        <div class="col-span-5 text-gray-700">Total</div>
                        <div class="col-span-3 text-right" id="total-debit" x-text="formattedTotalDebit" x-bind:class="balanceClass"></div>
                        <div class="col-span-3 text-right" id="total-credit" x-text="formattedTotalCredit" x-bind:class="balanceClass"></div>
                        <div class="col-span-1"></div>
                    </div>

                    <!-- Balance Indicator -->
                    <div class="mt-3 flex items-center gap-2 text-sm" x-show="hasAmounts">
                        <span x-show="isBalanced" class="inline-flex items-center gap-1 text-green-700">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                            Jurnal seimbang
                        </span>
                        <span x-show="showDifference" class="inline-flex items-center gap-1 text-red-600">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                            Selisih: <span x-text="formattedDifference"></span>
                        </span>
                    </div>
                </div>

                <!-- Error Message -->
                <div x-show="errorMessage" x-cloak
                     class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm"
                     x-text="errorMessage"></div>

                <!-- Action Buttons -->
                <div class="flex items-center gap-3">
                    <button type="button" id="btn-save-draft" x-on:click="saveDraft"
                            x-bind:disabled="submitting"
                            class="px-6 py-2.5 text-sm font-medium text-white bg-primary-600 rounded-lg hover:bg-primary-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                        <span x-text="saveButtonText"></span>
                    </button>

                    <button type="button" id="btn-save-post" x-on:click="saveAndPost"
                            sec:authorize="hasAuthority('TRANSACTION_POST')"
                            x-bind:disabled="submitting"
                            class="px-6 py-2.5 text-sm font-medium text-primary-700 bg-primary-50 border border-primary-300 rounded-lg hover:bg-primary-100 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                        <span x-text="postButtonText"></span>
                    </button>

                    <a th:href="@{/transactions}" class="px-6 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                        Batal
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- All logic lives in alpine-components.js as journalEntryForm -->
    <script th:attr="nonce=${cspNonce}">/* journal entry form uses Alpine.data('journalEntryForm') */</script>
</body>
</html>
