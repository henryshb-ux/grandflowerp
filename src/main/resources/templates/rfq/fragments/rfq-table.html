<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<body>

<div id="rfq-table-wrapper" th:fragment="table">
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200 text-sm">
            <thead class="bg-gray-50">
            <tr>
                <th class="px-4 py-3 text-left font-medium text-gray-500 uppercase tracking-wide text-xs">
                    No. RFQ
                </th>
                <th class="px-4 py-3 text-left font-medium text-gray-500 uppercase tracking-wide text-xs">
                    Customer
                </th>
                <th class="px-4 py-3 text-left font-medium text-gray-500 uppercase tracking-wide text-xs">
                    Perihal
                </th>
                <th class="px-4 py-3 text-left font-medium text-gray-500 uppercase tracking-wide text-xs">
                    Tgl RFQ
                </th>
                <th class="px-4 py-3 text-left font-medium text-gray-500 uppercase tracking-wide text-xs">
                    Batas Respon
                </th>
                <th class="px-4 py-3 text-center font-medium text-gray-500 uppercase tracking-wide text-xs">
                    Item
                </th>
                <th class="px-4 py-3 text-center font-medium text-gray-500 uppercase tracking-wide text-xs">
                    Status
                </th>
                <th class="px-4 py-3 text-right font-medium text-gray-500 uppercase tracking-wide text-xs">
                    Aksi
                </th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">

            <!-- Empty state -->
            <tr th:if="${page.empty}">
                <td colspan="8" class="px-4 py-12 text-center">
                    <div class="flex flex-col items-center gap-3 text-gray-400">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                  d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <p class="text-sm">Belum ada RFQ</p>
                        <a th:href="@{/rfq/new}"
                           class="text-sm text-primary-600 hover:underline"
                           sec:authorize="hasAuthority('INVOICE_CREATE')">
                            + Input RFQ Pertama
                        </a>
                    </div>
                </td>
            </tr>

            <!-- Data rows -->
            <tr th:each="rfq : ${page.content}"
                class="hover:bg-gray-50 transition-colors cursor-pointer"
                th:onclick="|window.location.href='@{/rfq/{id}(id=${rfq.id})}'|">

                <!-- Nomor RFQ -->
                <td class="px-4 py-3">
                    <a th:href="@{/rfq/{id}(id=${rfq.id})}"
                       class="font-mono text-primary-600 hover:underline font-medium"
                       th:text="${rfq.rfqNumber}"
                       onclick="event.stopPropagation()">RFQ-2026-001</a>
                </td>

                <!-- Customer -->
                <td class="px-4 py-3">
                    <div>
                        <p class="font-medium text-gray-900" th:text="${rfq.client?.name}">-</p>
                        <p class="text-xs text-gray-400" th:text="${rfq.client?.phone}"></p>
                    </div>
                </td>

                <!-- Perihal -->
                <td class="px-4 py-3 max-w-xs">
                    <p class="truncate text-gray-700"
                       th:text="${rfq.subject != null ? rfq.subject : '-'}">-</p>
                    <p th:if="${rfq.project != null}"
                       class="text-xs text-gray-400 truncate"
                       th:text="'Proyek: ' + ${rfq.project.name}"></p>
                </td>

                <!-- Tanggal RFQ -->
                <td class="px-4 py-3 whitespace-nowrap text-gray-600"
                    th:text="${#temporals.format(rfq.rfqDate, 'dd MMM yyyy')}">-</td>

                <!-- Batas Respon -->
                <td class="px-4 py-3 whitespace-nowrap">
                    <span th:if="${rfq.responseDate != null}"
                          th:classappend="${rfq.open && rfq.responseDate.isBefore(#temporals.createNow().toLocalDate()) ? 'text-red-600 font-medium' : 'text-gray-600'}"
                          th:text="${#temporals.format(rfq.responseDate, 'dd MMM yyyy')}">-</span>
                    <span th:if="${rfq.responseDate == null}" class="text-gray-300">—</span>
                </td>

                <!-- Jumlah Item -->
                <td class="px-4 py-3 text-center">
                    <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-gray-100 text-gray-600 text-xs font-medium"
                          th:text="${rfq.lines.size()}">0</span>
                </td>

                <!-- Status Badge -->
                <td class="px-4 py-3 text-center">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                          th:classappend="${
                              rfq.status.name() == 'OPEN'      ? 'bg-blue-100 text-blue-800' :
                              rfq.status.name() == 'QUOTED'    ? 'bg-green-100 text-green-800' :
                              rfq.status.name() == 'CLOSED'    ? 'bg-gray-100 text-gray-600' :
                                                                  'bg-red-100 text-red-700'}"
                          th:text="${rfq.status.label}">
                        Open
                    </span>
                </td>

                <!-- Aksi -->
                <td class="px-4 py-3 text-right whitespace-nowrap" onclick="event.stopPropagation()">
                    <div class="flex items-center justify-end gap-2">
                        <!-- Buat Quotation — hanya jika OPEN -->
                        <form th:if="${rfq.open}"
                              th:action="@{/rfq/{id}/create-quotation(id=${rfq.id})}"
                              method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="text-xs px-2.5 py-1 bg-primary-600 text-white rounded hover:bg-primary-700 transition-colors whitespace-nowrap"
                                    sec:authorize="hasAuthority('INVOICE_CREATE')"
                                    title="Buat Quotation dari RFQ ini">
                                + Buat QT
                            </button>
                        </form>
                        <a th:href="@{/rfq/{id}(id=${rfq.id})}"
                           class="text-xs text-gray-500 hover:text-gray-700">Detail</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- Pagination -->
        <div th:if="${page.totalPages > 1}"
             class="px-4 py-3 border-t border-gray-200 flex items-center justify-between">
            <p class="text-sm text-gray-500"
               th:text="'Menampilkan ' + ${page.numberOfElements} + ' dari ' + ${page.totalElements} + ' RFQ'"></p>
            <div class="flex gap-1">
                <a th:if="${!page.first}"
                   th:href="@{/rfq(page=${page.number - 1}, status=${selectedStatus?.name()}, search=${search})}"
                   class="px-3 py-1 border border-gray-300 rounded text-sm hover:bg-gray-50">← Prev</a>
                <span class="px-3 py-1 text-sm text-gray-600"
                      th:text="${page.number + 1} + ' / ' + ${page.totalPages}"></span>
                <a th:if="${!page.last}"
                   th:href="@{/rfq(page=${page.number + 1}, status=${selectedStatus?.name()}, search=${search})}"
                   class="px-3 py-1 border border-gray-300 rounded text-sm hover:bg-gray-50">Next →</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
